services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: fitness-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fitness-api
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./ui:/app/ui
      - ./knowledge_base:/app/knowledge_base
      - ./workout_history:/app/workout_history
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  qdrant_storage:
